{% load static %}
{% load i18n i18n_urls %}
{% load meta %}
{% get_current_language as LANGUAGE_CODE %}

<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head {% meta_namespaces %}>
  <meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO -->
  {% include 'meta/meta.html' %}
  <link rel="canonical" href="{% canonical_url %}">

  <!-- LANGUAGES -->
  <link rel="alternate" hreflang="it" href="{% alternate_url 'it' %}">
  <link rel="alternate" hreflang="en" href="{% alternate_url 'en' %}">
  <link rel="alternate" hreflang="x-default" href="{% alternate_url 'it' %}">

  <!-- FAVICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}">

  <!-- FLATPICKR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- TAILWIND PLAY CDN (preflight enabled — no Bootstrap) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            primary:  { DEFAULT: '#2563eb', foreground: '#fff' },
            muted:    { DEFAULT: '#f1f5f9', foreground: '#64748b' },
            border:   '#e2e8f0',
            background: '#f8fafc',
            foreground: '#0f172a',
            sidebar:  { DEFAULT: '#fafafa', border: '#e2e8f0' },
            rating:   '#eab308',
          },
          boxShadow: {
            card: '0 2px 8px rgba(0,0,0,.06)',
            'card-hover': '0 8px 24px rgba(0,0,0,.11)',
          },
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .scrollbar-hide { scrollbar-width: none; -ms-overflow-style: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>

  {% block style %}{% endblock style %}
</head>

<body class="bg-background text-foreground antialiased">

{% block bodycontent %}{% endblock bodycontent %}
{% block bodyjs %}{% endblock bodyjs %}

</body>
</html>
