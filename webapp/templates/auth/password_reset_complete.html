{% extends "base_webapp.html" %}
{% load i18n %}

{% block content %}

  <div class="min-h-[60vh] flex items-center justify-center py-12">
    <div class="w-full max-w-sm text-center">

      <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 text-green-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
      </div>

      <h1 class="text-2xl font-extrabold text-slate-900 mb-2">{% trans "Password updated!" %}</h1>
      <p class="text-sm text-slate-500 mb-8">
        {% trans "Your password has been set. You can now sign in with your new password." %}
      </p>

      <a href="{% url 'login' %}"
         class="inline-flex items-center gap-2 rounded-full bg-slate-900 px-5 py-3 text-sm font-bold text-white hover:bg-slate-700 transition-colors text-decoration-none">
        {% trans "Sign in" %}
      </a>

    </div>
  </div>

{% endblock content %}
