{% load static %}
{% load i18n i18n_urls %}
{% load meta %}
{% get_current_language as LANGUAGE_CODE %}


<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head {% meta_namespaces %}>
  <meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO -->
  {% include 'meta/meta.html' %}
  <link rel="canonical" href="{% canonical_url %}">

  <!-- LANGUAGES -->
  <link rel="alternate" hreflang="it" href="{% alternate_url 'it' %}">
  <link rel="alternate" hreflang="en" href="{% alternate_url 'en' %}">
  <link rel="alternate" hreflang="x-default" href="{% alternate_url 'it' %}">

  <!-- FAVICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}">

  <!-- BOOTSTRAP / BS ICONS / FLATPICKR -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <!-- Google Tag Manager -->
  <script>(function (w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({
          'gtm.start':
              new Date().getTime(), event: 'gtm.js'
      });
      var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : '';
      j.async = true;
      j.src =
          'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);
  })(window, document, 'script', 'dataLayer', 'GTM-TDWC5GF6');</script>
  <!-- End Google Tag Manager -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');

    body {
        font-family: 'Roboto', sans-serif;
    }

    h1, h2, h3, h4, h5, .h1, .h2, .h3, .h4, .h5 {
        font-family: "Roboto Slab", serif;
        font-weight: 600;
        font-style: normal;
    }

    body .iubenda-tp-btn.iubenda-cs-preferences-link {
        display: none !important;
        visibility: hidden !important;
    }
  </style>

  {% block style %}{% endblock style %}
</head>

<body
    class="d-flex flex-column h-100 min-vh-100 {% block bodyclass %}{% endblock bodyclass %}"
    id="{% block bodyid %}{% endblock bodyid %}"
>

<!-- Google Tag Manager (noscript) -->
<noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TDWC5GF6"
          height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->

{% block bodycontent %}{% endblock bodycontent %}
{% block bodyjs %}{% endblock bodyjs %}

<script type="text/javascript">
    var _iub = _iub || [];
    _iub.csConfiguration = {
        "askConsentAtCookiePolicyUpdate": true,
        "floatingPreferencesButtonDisplay": false,
        "lang": "en",
        "perPurposeConsent": true,
        "siteId": 3545298,
        "whitelabel": true,
        "cookiePolicyId": 88029000,
        "banner": {
            "acceptButtonDisplay": true,
            "closeButtonDisplay": false,
            "customizeButtonDisplay": true,
            "explicitWithdrawal": true,
            "listPurposes": true,
            "position": "float-bottom-right",
            "rejectButtonDisplay": true,
            "showTitle": false
        }
    };
</script>
{#<script type="text/javascript" src="https://cs.iubenda.com/autoblocking/3545298.js"></script>#}
{#<script type="text/javascript" src="//cdn.iubenda.com/cs/iubenda_cs.js" charset="UTF-8" async></script>#}

</body>
</html>
