{% if user.is_authenticated and not user.user_profile.is_email_verified %}
  <div class="alert alert-danger alert-dismissible fade show p-0 m-0" role="alert">
    <div class="container d-flex justify-content-between align-items-center">
      <span>
        <i class="bi bi-exclamation-circle"></i>
        <strong>Your email is not verified.</strong> Verify your email to join tables.
        <a href="{% url "send_email_verification_code" %}"
           class="link-offset-3 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-100-hover">CLICK HERE</a>
        to receive a new verification email.
      </span>
      <button type="button" class="btn-close position-relative" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  </div>
{% else %}
  {% block alert %}
  {% endblock alert %}
{% endif %}
