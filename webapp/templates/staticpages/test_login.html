{% extends "base_webapp.html" %}
{% load custom_tags %}
{% load static %}
{% load i18n %}

{% block content %}
  <style>
      .g-sign-in-button {
          text-decoration: none;
          margin: 10px;
          display: inline-block;
          width: 240px;
          height: 50px;
          background-color: #4285f4;
          color: #fff;
          border-radius: 1px;
          box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.25);
          transition: background-color .218s, border-color .218s, box-shadow .218s;
      }

      .g-sign-in-button:hover {
          cursor: pointer;
          -webkit-box-shadow: 0 0 3px 3px rgba(66, 133, 244, 0.3);
          box-shadow: 0 0 3px 3px rgba(66, 133, 244, 0.3);
      }

      .g-sign-in-button:active {
          background-color: #3367D6;
          transition: background-color 0.2s;
      }

      .g-sign-in-button .content-wrapper {
          height: 100%;
          width: 100%;
          border: 1px solid transparent;
      }

      .g-sign-in-button img {
          width: 18px;
          height: 18px;
      }

      .g-sign-in-button .logo-wrapper {
          padding: 15px;
          background: #fff;
          width: 48px;
          height: 100%;
          border-radius: 1px;
          display: inline-block;
      }

      .g-sign-in-button .logo-wrapper img {
          vertical-align: top;
      }

      .g-sign-in-button .text-container {
          font-family: Roboto,arial,sans-serif;
          font-weight: 500;
          letter-spacing: .21px;
          font-size: 16px;
          line-height: 48px;
          vertical-align: top;
          border: none;
          display: inline-block;
          text-align: center;
          width: 180px;
      }
  </style>
  <div class="container py-4">
    <div class="row">
      <div class="col">
        <h1>Test Social Login</h1>
        <a href="{% url "social:begin" "google-oauth2" %}" class='g-sign-in-button'>
          <div class=content-wrapper>
            <div class='logo-wrapper'>
              <img src='https://developers.google.com/identity/images/g-logo.png'>
            </div>
            <span class='text-container'>
                <span>Sign in with Google</span>
              </span>
          </div>
        </a>


        <script src="https://accounts.google.com/gsi/client" async></script>
        <div id="g_id_onload"
             data-client_id="53033452479-m1e3ubpf593o585de69gvg7csmil12a9.apps.googleusercontent.com"
             data-login_uri="https://board-gamers.com{% url "social:begin" "google-oauth2" %}"
{#             data-auto_prompt="false"#}
        >
        </div>
        <div class="g_id_signin"
             data-type="standard" {# "standard", "icon"	#}
             data-size="large" {# "small", "medium", "large" #}
             data-theme="filled_blue" {# "outline", "filled_blue", "filled_black" #}
             data-text="sign_in_with" {# "signin", "signup", "continue", "signin_with", "signup_with", "continue_with" #}
             data-shape="rectangular" {# "rectangular", "pill", "circle", "square" #}
             data-logo_alignment="left"> {# "left", "center" #}
        </div>


      </div>
    </div>
  </div>
{% endblock content %}
