{% extends "base_webapp.html" %}
{% load i18n %}

{% block content %}

  <div class="min-h-[60vh] flex items-center justify-center py-12">
    <div class="w-full max-w-xs">

      <div class="text-center mb-8">
        <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="m10.5 21 5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 0 1 6-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 0 1-3.827-5.802" />
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-900">{% trans "Select language" %}</h1>
      </div>

      <div class="space-y-2">
        {% for lang in languages %}
          <form action="{% url 'set_language' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="language" value="{{ lang.code }}">
            <input type="hidden" name="next" value="{{ lang.next }}">
            <button type="submit"
                    class="w-full flex items-center justify-between gap-3 px-4 py-3.5 rounded-full border border-slate-200 bg-white text-sm font-semibold text-slate-700 hover:border-slate-300 hover:bg-slate-50 transition-colors">
              {{ lang.name }}
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-300">
                <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
              </svg>
            </button>
          </form>
        {% endfor %}
      </div>

    </div>
  </div>

{% endblock content %}
