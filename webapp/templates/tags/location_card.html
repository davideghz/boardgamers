{% load i18n custom_tags %}
<a href="{% url 'location-detail' location.slug %}" class="group block text-decoration-none">
  <div class="relative aspect-square rounded-xl overflow-hidden mb-2">
    <img src="{{ location.cover_url }}" alt="{{ location.name }}"
         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200"
         loading="lazy">
    {% if is_followed %}
      <span class="absolute top-1.5 right-1.5 bg-white/80 backdrop-blur-sm rounded-full p-1 leading-none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5 text-red-500">
          <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z" />
        </svg>
      </span>
    {% endif %}
  </div>
  <p class="text-sm font-semibold text-slate-900 truncate">{{ location.name }}</p>
  {% if location.city %}
    <p class="flex items-center gap-0.5 text-xs text-slate-400 mt-0.5 truncate">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3 h-3 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg>
      {{ location.city }}{% if location.distance %} ({{ location.distance|km }} km){% endif %}
    </p>
  {% endif %}
</a>
