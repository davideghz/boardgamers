{% extends "base_webapp.html" %}
{% load i18n %}

{% block content %}

  <div class="min-h-[60vh] flex items-center justify-center py-12">
    <div class="w-full max-w-sm">

      <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 text-red-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>
      </div>

      <h1 class="text-xl font-extrabold text-slate-900 text-center mb-2">{% trans "Confirm delete" %}</h1>
      <p class="text-sm text-slate-500 text-center mb-8">
        {% trans "Are you sure you want to delete" %} <strong class="text-slate-700">«{{ table.title }}»</strong>?
        {% trans "This action cannot be undone." %}
      </p>

      <form method="post" class="space-y-3">
        {% csrf_token %}
        <button type="submit"
                class="w-full flex items-center justify-center gap-2 rounded-full bg-red-600 px-4 py-3 text-sm font-bold text-white hover:bg-red-700 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
          {% trans "Delete" %}
        </button>
        <a href="{% url 'table-detail' table.slug %}"
           class="w-full flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 transition-colors text-decoration-none">
          {% trans "Cancel" %}
        </a>
      </form>

    </div>
  </div>

{% endblock content %}
