{% extends "base_webapp.html" %}
{% load static %}
{% load i18n %}

{% block content %}
  <div class="container py-4">
    <h1>{% trans "Confirm delete" %}</h1>
    <p>{% trans "Are you sure you want to delete" %} "{{ table.title }}"?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">{% trans "Delete" %}</button>
      <a href="{% url 'table-index' %}" class="btn btn-link">{% trans "Cancel" %}</a>
    </form>
  </div>
{% endblock %}
